on:
  push:
    branches:
      - develop
  merge_group:
    branches:
      - develop
      - main
      
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]
        node: [24]

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Check current dir
        run: pwd && ls -la && ls -la ..
